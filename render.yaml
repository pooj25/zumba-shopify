services:
  - type: web
    name: zumba-backend
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /data
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
    disk:
      name: zumba-data
      mountPath: /data
      sizeGB: 1
