<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Zumba Class</title>
    <style>
      :root {
        --bg: #fffaf6;
        --ink: #151313;
        --muted: #625d5a;
        --line: #e8ddd4;
        --accent: #ef476f;
        --dark: #20302f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(540px, 100%);
        background: white;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(20, 18, 17, .12);
      }

      h1, p { margin-top: 0; }
      p { color: var(--muted); }

      form {
        display: grid;
        gap: 13px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-weight: 750;
      }

      input, select, button {
        min-height: 48px;
        border-radius: 8px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font: inherit;
      }

      button {
        border: 0;
        background: var(--accent);
        color: white;
        font-weight: 900;
        cursor: pointer;
      }

      .success {
        display: none;
        margin-top: 18px;
        padding: 14px;
        border-radius: 8px;
        background: #e9fbf7;
        color: #047b6f;
        font-weight: 800;
      }

      a {
        color: var(--dark);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Book Your Zumba Pass</h1>
      <p>Submit your details to reserve a class pass. The studio can mark attendance from the admin panel.</p>

      <form id="bookingForm">
        <label>First name <input name="firstName" required></label>
        <label>Last name <input name="lastName" required></label>
        <label>Phone <input name="phone" required></label>
        <label>Email <input name="email" type="email"></label>
        <label>Plan
          <select name="product" id="product">
            <option>Trial Class</option>
            <option>10-Class Pass</option>
            <option>Monthly Membership</option>
          </select>
        </label>
        <button>Confirm booking</button>
      </form>

      <div class="success" id="success">
        Booking saved. Your pass is now added to the Zumba admin system.
      </div>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const selected = params.get('product');
      if (selected) document.getElementById('product').value = selected;

      document.getElementById('bookingForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const body = Object.fromEntries(new FormData(form).entries());
        const response = await fetch('/api/simulate-shopify-order', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!response.ok) {
          alert('Booking failed. Please try again.');
          return;
        }
        form.reset();
        document.getElementById('success').style.display = 'block';
      });
    </script>
  </body>
</html>
